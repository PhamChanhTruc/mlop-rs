apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: THESIS_CLOUD_RUN_SERVICE
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: THESIS_SERVICE_ACCOUNT_EMAIL
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/ARTIFACT_REGISTRY_REPO/IMAGE_NAME:TAG
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_URI
              value: models:/xgb-baseline-retailrocket/Production
            - name: MODEL_URI_FALLBACK_TO_LATEST_RUN
              value: "false"
            - name: PREDICTION_THRESHOLD
              value: "0.5"
            - name: FEAST_REPO_PATH
              value: /app/feature_repo
            - name: MLFLOW_TRACKING_URI
              value: https://YOUR-MLFLOW-ENDPOINT
            - name: MLFLOW_EXPERIMENT
              value: xgb-baseline-retailrocket
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
