name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  python-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r serving/requirements.txt
          pip install psycopg2-binary

      - name: Compile key Python entrypoints
        run: |
          python -m py_compile \
            data/scripts/preprocess_retailrocket.py \
            data/scripts/build_trainset_retailrocket.py \
            feature_repo/__init__.py \
            feature_repo/feature_definitions.py \
            feature_repo/build_online_features.py \
            feature_repo/repo.py \
            training/__init__.py \
            training/train_xgb_baseline.py \
            training/tune_xgb_optuna.py \
            training/promote_model.py \
            serving/__init__.py \
            serving/app.py \
            serving/realtime_features.py \
            serving/realtime_app.py \
            infra/airflow/dags/retailrocket_baseline_pipeline.py \
            smoke_mlflow.py

      - name: Run import smoke checks
        run: |
          python -c "import feature_repo.feature_definitions, feature_repo.build_online_features, training.train_xgb_baseline, training.tune_xgb_optuna, training.promote_model, serving.app, serving.realtime_app; print('core imports ok')"

      - name: Check CLI help entrypoints
        run: |
          python -m training.promote_model --help
          python -m training.tune_xgb_optuna --help

      - name: Validate deploy script syntax
        run: |
          bash -n deploy/gcp/deploy_cloud_run.sh
